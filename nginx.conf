events {
    worker_connections 1024;
}

http {
    client_max_body_size 20M;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Larger buffers for OAuth callbacks (Azure AD sends large headers)
        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
        large_client_header_buffers 4 32k;

        # Callmonitor SSE
        location /callmonitor/events {
            resolver 10.89.0.1 valid=5s;
            set $callmon http://callmonitor:3001;
            proxy_pass $callmon/events;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # Callmonitor Dial
        location /callmonitor/dial {
            resolver 10.89.0.1 valid=5s;
            set $callmon http://callmonitor:3002;
            proxy_pass $callmon/dial;
            proxy_http_version 1.1;
        }

        location / {
            resolver 10.89.0.1 valid=5s;
            set $upstream http://app:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        'upgrade';
            proxy_cache_bypass                 $http_upgrade;
            proxy_read_timeout                 60s;
        }
    }
}
