version: '3.8'

services:
  db:
    image: postgres:16-alpine
    security_opt:
      - label=disable
    environment:
      POSTGRES_DB: microcrm
      POSTGRES_USER: microcrm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db-data:/var/lib/postgresql/data:Z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    security_opt:
      - label=disable
    environment:
      DATABASE_URL: postgresql://microcrm:${DB_PASSWORD}@db:5432/microcrm
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_URL_INTERNAL: http://localhost:3000
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads:Z
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    security_opt:
      - label=disable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./certs:/etc/nginx/certs:ro,Z
    depends_on:
      - app
    restart: unless-stopped
